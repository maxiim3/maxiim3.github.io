name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# Note: pages: write and id-token: write are only needed for the official GitHub Pages API.
# This workflow uses JamesIves/github-pages-deploy-action (branch-based), so only contents: write is required.
permissions:
  contents: write

# Prevent concurrent deploys — cancel the in-progress run if a newer push arrives
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Build site
        run: bun run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
